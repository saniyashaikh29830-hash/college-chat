<!DOCTYPE html>
<html>
<head>
    <title>AskBunts - Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="chat-page">

<div class="app">

    <!-- HEADER -->
    <div class="top">
        <a href="index.html" class="back-btn" title="Back to Home"><i class="ri-arrow-left-line"></i></a>
        <div class="top-content">
            <h2>AskBunts</h2>
            <div class="status-container">
                <span class="status-dot"></span>
                <p>Bunts Sangha College</p>
            </div>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat">
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-content">
                <img src="assets/welcome_icon.png" alt="Welcome Mascot" class="welcome-mascot">
                <h1>How can I help you?</h1>
                <p>Choose an option below or ask me anything about the college.</p>
                <div class="chip-container">
                    <button class="chip" onclick="quickAction('Course Information')"><i class="ri-book-open-line"></i> Course Information</button>
                    <button class="chip" onclick="quickAction('Fee Structure')"><i class="ri-money-rupee-circle-line"></i> Fee Structure</button>
                    <button class="chip" onclick="quickAction('Library Resources')"><i class="ri-book-read-line"></i> Library Resources</button>
                </div>
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <input
            type="text"
            id="msg"
            placeholder="Ask about courses, library, fees..."
            autocomplete="off"
        >
        <button onclick="sendMessage()" id="sendBtn">
            <i class="ri-send-plane-2-fill"></i>
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
