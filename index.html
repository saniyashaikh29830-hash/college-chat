<!DOCTYPE html>
<html>
<head>
    <title>College AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="top">
        <h2>College AI Assistant</h2>
        <p>Bunts Sangha College</p>
    </div>

    <!-- CHAT AREA -->
    <div id="chat"></div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <input 
            type="text" 
            id="msg" 
            placeholder="Ask about college (e.g., courses, library, fees...)"
            autocomplete="off"
        >
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
